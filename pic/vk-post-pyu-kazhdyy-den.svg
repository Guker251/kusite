      <stop offset="1" stop-color="#DDEEFF"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 210) rotate(137.455) scale(392.276 295.54)">
