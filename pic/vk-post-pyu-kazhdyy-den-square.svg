<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1000" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#E9F4FF"/>
      <stop offset="1" stop-color="#DDEEFF"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(876 168) rotate(139.55) scale(296.62 241.307)">
      <stop stop-color="#FFF1BF"/>
      <stop offset="1" stop-color="#FFF1BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(176 870) rotate(28.754) scale(279.202 178.549)">
      <stop stop-color="#D8ECFF"/>
      <stop offset="1" stop-color="#D8ECFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4A8FD8"/>
      <stop offset="1" stop-color="#1C4F94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7AA8D5" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <circle cx="892" cy="165" r="22" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="944" cy="228" r="13" fill="#FFFFFF" fill-opacity="0.34"/>
  <circle cx="988" cy="194" r="8" fill="#FFFFFF" fill-opacity="0.52"/>

  <rect x="82" y="84" width="100" height="100" rx="26" fill="url(#glass)" stroke="#A8C6E6" stroke-opacity="0.65"/>
  <text x="113" y="149" fill="url(#accent)" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">КУ</text>

  <rect x="80" y="228" width="920" height="624" rx="40" fill="url(#glass)" stroke="#C8DDF3" filter="url(#shadow)"/>

  <text x="136" y="358" fill="#173C73" font-family="Montserrat, Arial, sans-serif" font-size="74" font-weight="700">
    <tspan x="136" dy="0">Пью каждый день:</tspan>
    <tspan x="136" dy="88">это уже проблема</tspan>
    <tspan x="136" dy="88">или ещё привычка?</tspan>
  </text>

  <text x="140" y="760" fill="#3D6191" font-family="Jost, Arial, sans-serif" font-size="30" font-weight="500">
    Разбираем частоту, ритуал
  </text>
  <text x="140" y="800" fill="#3D6191" font-family="Jost, Arial, sans-serif" font-size="30" font-weight="500">
    и первые сигналы потери контроля
  </text>

  <g opacity="0.95">
    <rect x="742" y="600" width="168" height="214" rx="34" fill="#F6FBFF" stroke="#C8DDF3"/>
    <rect x="774" y="568" width="104" height="52" rx="26" fill="#EBF5FF" stroke="#C8DDF3"/>
    <path d="M786 542C786 516 804 495 826 495C848 495 866 516 866 542V570H786V542Z" fill="#EBF5FF"/>
    <rect x="770" y="658" width="114" height="14" rx="7" fill="#BED9F3"/>
    <rect x="770" y="694" width="90" height="14" rx="7" fill="#D6E7F8"/>
    <rect x="770" y="730" width="104" height="14" rx="7" fill="#D6E7F8"/>
    <circle cx="826" cy="628" r="22" fill="url(#accent)" fill-opacity="0.18"/>
  </g>
