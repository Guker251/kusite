<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4DD4FF"/>
      <stop offset="1" stop-color="#FF6B9D"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16324F"/>
      <stop offset="1" stop-color="#10263A"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#132E2A"/>
      <stop offset="1" stop-color="#10241F"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3C1E33"/>
      <stop offset="1" stop-color="#2A1625"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B2814"/>
      <stop offset="1" stop-color="#2A1E12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="980" rx="32" fill="url(#bg)"/>
  <circle cx="1320" cy="160" r="220" fill="#4DD4FF" fill-opacity="0.08"/>
  <circle cx="250" cy="860" r="280" fill="#FF6B9D" fill-opacity="0.07"/>
  <circle cx="860" cy="520" r="360" fill="#77FFC8" fill-opacity="0.05"/>

  <text x="110" y="110" fill="#F8FAFC" font-family="Montserrat, Arial, sans-serif" font-size="42" font-weight="700">
    Карта разделов на главной
  </text>
  <text x="110" y="150" fill="#B8C4D6" font-family="Jost, Arial, sans-serif" font-size="24" font-weight="400">
    Короткая структура сайта в одном экране
  </text>

  <rect x="110" y="205" width="1380" height="120" rx="28" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="160" y="260" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="700">
    Главная страница
  </text>
  <text x="160" y="298" fill="#F5F7FA" font-family="Jost, Arial, sans-serif" font-size="24" font-weight="500">
    Быстрый вход в ключевые разделы сайта
  </text>
  <rect x="1190" y="235" width="250" height="56" rx="18" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="1242" y="271" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="600">
    Поиск по сайту
  </text>

  <line x1="340" y1="325" x2="340" y2="395" stroke="#6DD8FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="680" y1="325" x2="680" y2="395" stroke="#7AF2C1" stroke-width="4" stroke-linecap="round"/>
  <line x1="1020" y1="325" x2="1020" y2="395" stroke="#FF8EB8" stroke-width="4" stroke-linecap="round"/>
  <line x1="1360" y1="325" x2="1360" y2="395" stroke="#FFBC74" stroke-width="4" stroke-linecap="round"/>

  <rect x="140" y="395" width="400" height="220" rx="28" fill="url(#card1)" stroke="#4DD4FF" stroke-opacity="0.45" filter="url(#shadow)"/>
  <text x="175" y="450" fill="#4DD4FF" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">
    РАЗДЕЛ 1
  </text>
  <text x="175" y="495" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="700">
    Сколько можно пить
  </text>
  <text x="175" y="535" fill="#D6E2F0" font-family="Jost, Arial, sans-serif" font-size="22">
    Нормы, дозы, промилле,
  </text>
  <text x="175" y="565" fill="#D6E2F0" font-family="Jost, Arial, sans-serif" font-size="22">
    влияние на организм
  </text>
  <rect x="175" y="585" width="165" height="34" rx="12" fill="#4DD4FF" fill-opacity="0.12"/>
  <text x="198" y="608" fill="#9DEBFF" font-family="Jost, Arial, sans-serif" font-size="18" font-weight="500">
    цифры и расчеты
  </text>

  <rect x="580" y="395" width="400" height="220" rx="28" fill="url(#card2)" stroke="#77FFC8" stroke-opacity="0.42" filter="url(#shadow)"/>
  <text x="615" y="450" fill="#77FFC8" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">
    РАЗДЕЛ 2
  </text>
  <text x="615" y="495" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="700">
    Как меньше пить
  </text>
  <text x="615" y="535" fill="#D9F3EA" font-family="Jost, Arial, sans-serif" font-size="22">
    Контроль, правила,
  </text>
  <text x="615" y="565" fill="#D9F3EA" font-family="Jost, Arial, sans-serif" font-size="22">
    ежедневные стратегии
  </text>
  <rect x="615" y="585" width="152" height="34" rx="12" fill="#77FFC8" fill-opacity="0.12"/>
  <text x="638" y="608" fill="#B9FFE2" font-family="Jost, Arial, sans-serif" font-size="18" font-weight="500">
    практика КУ
  </text>

  <rect x="1020" y="395" width="400" height="220" rx="28" fill="url(#card3)" stroke="#FF6B9D" stroke-opacity="0.48" filter="url(#shadow)"/>
  <text x="1055" y="450" fill="#FF8CB3" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">
    РАЗДЕЛ 3
  </text>
  <text x="1055" y="495" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="700">
    Почему хочется алкоголя
  </text>
  <text x="1055" y="535" fill="#F3DCE5" font-family="Jost, Arial, sans-serif" font-size="22">
    Причины тяги, стресс,
  </text>
  <text x="1055" y="565" fill="#F3DCE5" font-family="Jost, Arial, sans-serif" font-size="22">
    привычки и окружение
  </text>
  <rect x="1055" y="585" width="185" height="34" rx="12" fill="#FF6B9D" fill-opacity="0.12"/>
  <text x="1078" y="608" fill="#FFB4CD" font-family="Jost, Arial, sans-serif" font-size="18" font-weight="500">
    причины употребления
  </text>

  <rect x="600" y="665" width="400" height="220" rx="28" fill="url(#card4)" stroke="#FF9F4D" stroke-opacity="0.45" filter="url(#shadow)"/>
  <text x="635" y="720" fill="#FFB677" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">
    РАЗДЕЛ 4
  </text>
  <text x="635" y="765" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="700">
    Признаки алкоголизма
  </text>
  <text x="635" y="805" fill="#F0E1D2" font-family="Jost, Arial, sans-serif" font-size="22">
    Самопроверка, симптомы,
  </text>
  <text x="635" y="835" fill="#F0E1D2" font-family="Jost, Arial, sans-serif" font-size="22">
    риски и границы проблемы
  </text>
  <rect x="635" y="855" width="176" height="34" rx="12" fill="#FF9F4D" fill-opacity="0.12"/>
  <text x="658" y="878" fill="#FFD0A0" font-family="Jost, Arial, sans-serif" font-size="18" font-weight="500">
    самодиагностика
  </text>

  <line x1="800" y1="615" x2="800" y2="665" stroke="#FFB677" stroke-width="4" stroke-linecap="round"/>

  <rect x="1045" y="690" width="360" height="140" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="1080" y="735" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">
    Дополнительно
  </text>
  <text x="1080" y="770" fill="#D3DCE8" font-family="Jost, Arial, sans-serif" font-size="21">
    Статьи
  </text>
  <text x="1185" y="770" fill="#D3DCE8" font-family="Jost, Arial, sans-serif" font-size="21">
    Тесты
  </text>
  <text x="1280" y="770" fill="#D3DCE8" font-family="Jost, Arial, sans-serif" font-size="21">
    Книги
  </text>
  <text x="1080" y="800" fill="#D3DCE8" font-family="Jost, Arial, sans-serif" font-size="21">
    Форум
  </text>

  <rect x="140" y="690" width="360" height="140" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="175" y="735" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">
    Быстрые входы
  </text>
  <text x="175" y="770" fill="#D3DCE8" font-family="Jost, Arial, sans-serif" font-size="21">
    С чего начать
  </text>
  <text x="175" y="800" fill="#D3DCE8" font-family="Jost, Arial, sans-serif" font-size="21">
    Алкоголь в ситуациях
  </text>

  <text x="110" y="930" fill="#9FB0C4" font-family="Jost, Arial, sans-serif" font-size="20">
    Схема для главной: пользователь сразу видит 4 базовых раздела и 2 вспомогательных маршрута
  </text>
</svg>
